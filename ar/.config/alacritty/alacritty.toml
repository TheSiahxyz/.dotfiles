[general]
import = ["~/.config/alacritty/themes/gruvbox_dark.toml"]

[env]
TERM = "xterm-256color"

[terminal.shell]
program = "/usr/bin/zsh"
args = ["-l"]

[window]
padding = { x = 1, y = 1 }
dynamic_padding = true
opacity = 0.65
decorations = "None"
dynamic_title = true

[window.dimensions]
columns = 80
lines = 24

[font]
size = 12.0

[font.normal]
family = "monospace"
style = "Regular"

[font.bold]
family = "monospace"
style = "Bold"

[font.italic]
family = "monospace"
style = "Italic"

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 800
unfocused_hollow = true

[scrolling]
history = 10000
multiplier = 3

[selection]
semantic_escape_chars = " `'\"()[]{}"
save_to_clipboard = false

[keyboard]
bindings = [
  { key = "c", mods = "Alt", action = "Copy" },
  { key = "v", mods = "Alt", action = "Paste" },
  { key = "C", mods = "Control|Shift", action = "Copy" },
  { key = "V", mods = "Control|Shift", action = "Paste" },
  { key = "Insert", mods = "Shift", action = "PasteSelection" },
  { key = "K", mods = "Alt|Shift", action = "IncreaseFontSize" },
  { key = "J", mods = "Alt|Shift", action = "DecreaseFontSize" },
  { key = "Plus", mods = "Alt|Shift", action = "ResetFontSize" },
  { key = "f", mods = "Alt", action = "ToggleFullscreen" },
  { key = "F11", action = "ToggleFullscreen" },
  { key = "Return", mods = "Alt|Shift", action = "SpawnNewInstance" },
  { key = "PageUp",   mods = "Shift", action = "ScrollPageUp" },
  { key = "PageDown", mods = "Shift", action = "ScrollPageDown" },
  { key = "Space", mods = "Shift", action = "ToggleViMode" },
  { key = "F", mods = "Control|Shift", action = "SearchForward" },
  { key = "B", mods = "Control|Shift", action = "SearchBackward" },
]

[hints]
[[hints.enabled]]
regex = '(https://|http://|file://|git://|ssh://|ftp://|mailto:)[^\s<>"]+'
hyperlinks = true
command = "xdg-open"
post_processing = true
mouse = { enabled = true, mods = "Control" }
binding = { key = "U", mods = "Control|Shift" }
