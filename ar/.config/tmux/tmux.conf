### --- Settings --- ###
set -g base-index 1
set -g pane-base-index 1
set -g default-shell /usr/bin/zsh
set -g detach-on-destroy off
set -g focus-events on
set -g history-limit 1000000
set -g mouse on
set -g renumber-windows on
set -g set-clipboard on
set -gq allow-passthrough on
set -sg escape-time 0
setw -g mode-keys vi
setw -g aggressive-resize on

# color
# set -g default-terminal "tmux-256color"
set -g default-terminal 'screen-256color'
set -ga terminal-overrides ',xterm-256color:Tc'
set -sa terminal-features ',xterm-256color:RGB'

# status
set -g status-interval 1
set -g status-justify absolute-centre
set -g status-left-length 10
set -g status-position top


### --- Key Bindings --- ###
# clear
bind-key 'l' "send-keys C-l; send-keys -R; clear-history"

# pane
bind-key '%' split-window -h -c '#{pane_current_path}'
bind-key '"' split-window -v -c '#{pane_current_path}'
bind-key '|' split-window -h
bind-key '-' split-window -v
bind-key -r 'C-j' resize-pane -D 5
bind-key -r 'C-k' resize-pane -U 5
bind-key -r 'C-h' resize-pane -L 5
bind-key -r 'C-l' resize-pane -R 5
bind-key '@' choose-window 'join-pane -h -s "%%"'
bind-key '#' choose-window 'join-pane -s "%%"'

# prefix
unbind 'C-b'
set -g prefix 'C-Space'
bind-key 'C-Space' send-prefix

# reload
unbind 'r'
bind-key 'r' source-file "~/.config/tmux/tmux.conf" \; display "Reloaded!"

# session
bind-key -r '(' switch-client -p \; refresh-client -S
bind-key -r ')' switch-client -n \; refresh-client -S
bind-key "'" switch-client -t'{marked}'
bind-key -r 'C-Space' switch-client -l

# window
bind-key -r 'H' previous-window \; refresh-client -S
bind-key -r 'L' next-window \; refresh-client -S
bind-key 'c' new-window -c "#{pane_current_path}"
bind-key -r 'Space' last-window

# shell
bind-key 'h' run-shell "~/.local/bin/tmuxtoggle"

# swap
bind-key -r '<' swap-window -d -t -1
bind-key -r '>' swap-window -d -t +1


### --- Plugins --- ###
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'olimorris/tmux-pomodoro-plus'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'


### --- Theme --- ###
# catppuccin
set -g @catppuccin_date_time_text '%a %m/%d %H:%M'
set -g @catppuccin_directory_text '#{pane_current_path}'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_connect_separator 'yes'
set -g @catppuccin_status_fill 'icon'
set -g @catppuccin_status_justify "left"
set -g @catppuccin_status_left_separator '█'
set -g @catppuccin_status_right_separator '█'
set -g @catppuccin_window_left_separator '█'
set -g @catppuccin_window_middle_separator '█ '
set -g @catppuccin_window_right_separator '█'
set -g @catppuccin_window_number_position 'left'
set -g @catppuccin_status_right_separator_inverse 'yes'
set -g @catppuccin_window_default_fill 'number'
set -g @catppuccin_window_default_text '#W'
set -g @catppuccin_window_current_fill 'number'
set -g @catppuccin_window_current_text '#W'
set -g @catppuccin_status_modules_left ''
set -g @catppuccin_status_modules_right 'session gitmux continuum pomodoro_plus'
set -g @catppuccin_custom_plugin_dir "~/.config/tmux"

# pomodoro
set -g @pomodoro_on "#[fg=$text_red]"
set -g @pomodoro_complete "#[fg=$text_green]"
set -g @pomodoro_pause "#[fg=$color_yellow]"
set -g @pomodoro_prompt_break "#[fg=$color_green]?"
set -g @pomodoro_prompt_pomodoro "#[fg=$color_gray]?"
set -g @pomodoro_interval_display "[%s/%s]"
set -g @pomodoro_granularity 'on'


### --- Plugins Settings --- ###
# continuum
# set -g @continuum-boot 'on'
# set -g @continuum-boot-options 'kitty'
# set -g @continuum-restore 'on'
# set -g @continuum-save-interval '120'  # min, 0 for disable

# copycat
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send-keys -X copy-selection-and-cancel

# open
set -g @open 'o'
set -g @open-editor 'C-o'
set -g @open-W 'https://www.searx.thesiah.xyz/?q='

# resurrect
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'

# tmux-fzf
TMUX_FZF_LAUNCH_KEY="F"
TMUX_FZF_ORDER='session|window|pane|command|keybinding|clipboard|process'
TMUX_FZF_OPTIONS="-p -w 75% -h 85% -m"
TMUX_FZF_PANE_FORMAT='                                                  \
    [#{window_name}]                                                    \
    #{pane_current_command}                                             \
    [#{pane_width}x#{pane_height}]                                      \
    [history #{history_size}/#{history_limit}, #{history_bytes} bytes]  \
    #{?pane_active,[active],[inactive]}'

bind-key 'C-b' run-shell -b "~/.config/tmux/plugins/tmux-fzf/scripts/keybinding.sh"
bind-key 'C-p' run-shell -b "~/.config/tmux/plugins/tmux-fzf/scripts/pane.sh"
bind-key 'C-s' run-shell -b "~/.config/tmux/plugins/tmux-fzf/scripts/session.sh"
bind-key 'C-w' run-shell -b "~/.config/tmux/plugins/tmux-fzf/scripts/window.sh"
bind-key 'C-r' run-shell -b "~/.config/tmux/plugins/tmux-fzf/scripts/process.sh"
bind-key 'C-c' run-shell -b "~/.config/tmux/plugins/tmux-fzf/scripts/command.sh"

bind-key 'f' run-shell "sesh connect \"$(
	sesh list | fzf-tmux -p 70%,60% \
		--no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
		--header '  ^a all ^t tmux ^c configs ^d .dotfiles ^v private ^b ^r scripts ^s suckless ^f zoxide ^x tmux kill ^g home' \
		--bind 'tab:down,btab:up' \
		--bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list)' \
		--bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t)' \
		--bind 'ctrl-c:change-prompt(⚙️  )+reload(sesh list -c)' \
		--bind 'ctrl-f:change-prompt(📁  )+reload(sesh list -z)' \
		--bind 'ctrl-g:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
		--bind 'ctrl-x:execute(tmux kill-session -t {})+change-prompt(⚡  )+reload(sesh list)' \
		--bind 'ctrl-d:change-prompt(🔯  )+reload(fd -H -d 2 -t d -E .Trash . ~/.dotfiles)' \
		--bind 'ctrl-v:change-prompt(🧑  )+reload(fd -H -d 2 -t d -E .Trash . ~/Private)' \
		--bind 'ctrl-b:change-prompt(👯  )+reload(fd -H -d 2 -t d -E .Trash . ~/Public)' \
		--bind 'ctrl-r:change-prompt(👟  )+reload(fd -H -d 2 -t d -E .Trash . ~/.local/bin)' \
		--bind 'ctrl-s:change-prompt(🦴  )+reload(fd -H -d 2 -t d -E .Trash . ~/.local/src/suckless)'
)\""

# tpm
if 'test ! -d ~/.config/tmux/plugins/tpm' \
    'run "git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm"'
run "~/.config/tmux/plugins/tpm/tpm"
