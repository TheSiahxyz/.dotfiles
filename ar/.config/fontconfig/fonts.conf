<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
	<alias>
		<family>serif</family>
		<prefer>
			<family>Source Han Serif KR</family>
			<family>DejaVu Serif</family>
			<family>Droid Serif</family>
			<family>Joy Pixels</family>
			<family>Noto Color Emoji</family>
			<family>FontAwesome</family>
		</prefer>
	</alias>
	<alias>
		<family>sans-serif</family>
		<prefer>
			<family>Source Han Serif KR</family>
			<family>DejaVu Serif</family>
			<family>Droid Serif</family>
			<family>Joy Pixels</family>
			<family>Noto Color Emoji</family>
			<family>FontAwesome</family>
		</prefer>
	</alias>
	<alias>
		<family>sans</family>
		<prefer>
			<family>Source Han Sans KR</family>
			<family>DejaVu Sans</family>
			<family>Droid Sans</family>
			<family>Joy Pixels</family>
			<family>Noto Color Emoji</family>
			<family>FontAwesome</family>
		</prefer>
	</alias>
	<alias>
		<family>monospace</family>
		<prefer>
      <family>Hack Nerd Font Mono</family>
			<family>Noto Sans Mono</family>
      <family>Noto Sans Mono CJK KR</family>
			<family>Font Awesome 6 Free</family>
			<family>Font Awesome 6 Brands</family>
			<family>Braille</family>
		</prefer>
	</alias>
  <alias>
    <family>nerdmono</family>
    <prefer>
      <family>D2CodingLigature Nerd Font Mono</family>
      <family>Hack Nerd Font Mono</family>
      <family>FontAwesome</family>
      <family>Braille</family>
    </prefer>
  </alias>
  <alias>
    <family>ko</family>
    <prefer>
      <family>Noto Sans CJK KR</family>
      <family>D2CodingLigature Nerd Font</family>
      <family>FontAwesome</family>
      <family>Braille</family>
    </prefer>
  </alias>
  <match target="scan">
    <test name="family" compare="contains">
      <string>YetHangul</string>
    </test>
    <edit name="charset" mode="assign">
      <minus>
        <name>charset</name>
        <charset>
          <range><int>0xe000</int><int>0xf8ff</int></range>
        </charset>
      </minus>
    </edit>
  </match>
  <match target="scan">
    <test name="family" compare="contains">
      <string>Adwaita</string>
    </test>
    <edit name="charset" mode="assign">
      <minus>
        <name>charset</name>
        <charset>
          <range><int>0xe000</int><int>0xf8ff</int></range>
        </charset>
      </minus>
    </edit>
  </match>
</fontconfig>
